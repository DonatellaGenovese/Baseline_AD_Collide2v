# @package _global_

# Train a VAE for anomaly detection on QCD (background only).
# Loss = MSE reconstruction + beta * KL divergence (ELBO).
# Anomaly score = reconstruction MSE. Val/test AUC evaluated on QCD vs VBFHbb.
#
# Run with:
#   python src/train.py experiment=ad_vae

defaults:
  - override /data: collide2v_ad
  - override /model: vae
  - override /callbacks: default
  - override /trainer: gpu

tags: ["collide2v", "vae", "anomaly_detection"]

data:
  train_val_test_split_per_class: [500_000, 20_000, 20_000]
  label: "AD_QCD_VBFHbb"
  to_classify:
    - "QCD_inclusive"
    - "VBFHbb"
  datasets_config:
    jets:
      cols:
        - FullReco_JetPuppiAK4_PT
        - FullReco_JetPuppiAK4_Eta
        - FullReco_JetPuppiAK4_Phi
        - FullReco_JetPuppiAK4_Mass
        - FullReco_JetPuppiAK4_BTag
        - FullReco_JetPuppiAK4_NCharged
        - FullReco_JetPuppiAK4_NNeutrals
      topk: 12
      count: true

    electrons:
      cols:
        - FullReco_Electron_PT
        - FullReco_Electron_Eta
        - FullReco_Electron_Phi
        - FullReco_Electron_Charge
        - FullReco_Electron_EhadOverEem
        - FullReco_Electron_IsolationVarRhoCorr
        - FullReco_Electron_D0
        - FullReco_Electron_DZ
      topk: 8
      count: false

    muons:
      cols:
        - FullReco_MuonTight_PT
        - FullReco_MuonTight_Eta
        - FullReco_MuonTight_Phi
        - FullReco_MuonTight_Charge
        - FullReco_MuonTight_IsolationVarRhoCorr
        - FullReco_MuonTight_D0
        - FullReco_MuonTight_DZ
      topk: 8
      count: false

    photons:
      cols:
        - FullReco_PhotonTight_PT
        - FullReco_PhotonTight_Eta
        - FullReco_PhotonTight_Phi
        - FullReco_PhotonTight_EhadOverEem
        - FullReco_PhotonTight_IsolationVarRhoCorr
      topk: 8
      count: false

    puppi_met:
      cols:
        - FullReco_PUPPIMET_MET
        - FullReco_PUPPIMET_Phi
      topk: null
      count: false

trainer:
  min_epochs: 1
  max_epochs: 100
  gradient_clip_algorithm: norm
  gradient_clip_val: 1.0

model:
  latent_dim: 16
  hidden_dims: [256, 128, 64]
  beta: 1.0
  anomaly_score_type: "reconstruction"

preprocess:
  enabled: true

logger:
  mlflow:
    run_name: "VAE_QCD_VBFHbb"
    experiment_name: "anomaly_detection"
