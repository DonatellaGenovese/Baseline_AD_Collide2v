  "ZZ_semi-lept": "ZZ_semileptonic"
  "VVV": "VVV_incl"
  "VH_incl": "VH_incl"
  # single-Higgs
  "ggHbb": "ggHbb"
  "ggHcc": "ggHcc"
  "ggHgammagamma": "ggHgammagamma"
  "ggHgluglu": "ggHgluglu"
  "ggHtautau": "ggHtautau"
