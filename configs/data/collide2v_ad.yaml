  "VBFHgammagamma": "VBFHgammagamma"
  "VBFHgluglu": "VBFHgluglu"
  "VBFHtautau": "VBFHtautau"
  "VBFHWW": "VBFHWW"
  "VBFHZZ": "VBFHZZ"
  # di-Higgs
  "HH_4b": "HH_4b"
  "HH_bbtautau": "HH_bbtautau"
  "HH_bbWW": "HH_bbWW"
  "HH_bbZZ": "HH_bbZZ"
